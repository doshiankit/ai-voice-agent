[program:pipeline_service]
command=/root/ai-voice-agent/services/pipeline_service/pipeline_venv/bin/python -m uvicorn app:app --host 0.0.0.0 --port 8004
directory=/root/ai-voice-agent/services/pipeline_service

autostart=true
autorestart=true
startsecs=5
startretries=3

stopsignal=TERM
stopwaitsecs=10

stderr_logfile=/var/log/ai_agent/pipeline_service.err.log
stdout_logfile=/var/log/ai_agent/pipeline_service.out.log

user=root

environment=PATH="/root/ai-voice-agent/services/pipeline_service/pipeline_venv/bin:%(ENV_PATH)s",PYTHONUNBUFFERED=1
