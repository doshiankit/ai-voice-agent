[program:agent_service]
directory=/root/ai-voice-agent/services/agent_service
command=/root/ai-voice-agent/services/agent_service/agent_venv/bin/uvicorn app:app --host 0.0.0.0 --port 8003
autostart=true
autorestart=true
startsecs=5
stopsignal=TERM
stopwaitsecs=10
stdout_logfile=/var/log/ai_agent/agent_service.out.log
stderr_logfile=/var/log/ai_agent/agent_service.err.log
environment=PYTHONUNBUFFERED=1
