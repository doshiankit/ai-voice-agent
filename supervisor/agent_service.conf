[program:agent_service]
directory=/root/ai-voice-agent/services/agent_service

command=/root/ai-voice-agent/services/agent_service/agent_venv/bin/python -m uvicorn app:app --host 0.0.0.0 --port 8003

autostart=true
autorestart=true
startsecs=5
startretries=3

stopsignal=TERM
stopwaitsecs=10

stdout_logfile=/var/log/voice_ai_agent/agent_service.out.log
stderr_logfile=/var/log/voice_ai_agent/agent_service.err.log

environment=PATH="/root/ai-voice-agent/services/agent_service/agent_venv/bin:%(ENV_PATH)s",PYTHONUNBUFFERED=1
