[program:tts_service]
directory=/root/ai-voice-agent/services/tts_service

command=/root/ai-voice-agent/services/tts_service/tts_venv/bin/python -m uvicorn app:app --host 0.0.0.0 --port 8002

autostart=true
autorestart=true
startsecs=5
startretries=3

stopsignal=TERM
stopwaitsecs=10

stdout_logfile=/var/log/ai_agent/tts_service.out.log
stderr_logfile=/var/log/ai_agent/tts_service.err.log

environment=PATH="/root/ai-voice-agent/services/tts_service/tts_venv/bin:%(ENV_PATH)s",PYTHONUNBUFFERED=1
